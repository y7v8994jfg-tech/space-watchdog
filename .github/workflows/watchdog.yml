name: HF Space Watchdog

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Space Watchdog
        env:
          HF_TOKEN: "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"
          SPACE_REPO: avvnire/agent-data
          SPACE_URL: https://avvnire-agent-data.hf.space
        run: python scripts/watchdog.py
